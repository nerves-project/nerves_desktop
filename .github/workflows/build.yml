name: Build Nightly Release

on:
  push:
    branches:
      - main

env:
  otp-version: '28.5'
  elixir-version: '1.19.5'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: "aarch64-apple-darwin"
          - platform: macos-15-intel
            target: "x86_64-apple-darwin"
          - platform: ubuntu-22.04-arm
            target: "aarch64-unknown-linux-gnu"
          - platform: ubuntu-22.04
            target: "x86_64-unknown-linux-gnu"
          - platform: windows-2022
            target: "x86_64-pc-windows-msvc"
            
    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.otp-version }}
          elixir-version: ${{ env.elixir-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Elixir Dependencies
        run: |
          mix deps.get

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIX_ENV: prod
        with:
          tagName: nightly
          releaseName: 'Nightly Build'
          releaseBody: 'Automatically generated nightly build from the latest main branch.'
          releaseDraft: false
          prerelease: true
